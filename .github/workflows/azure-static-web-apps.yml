name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore
      - name: Publish
        run: dotnet publish ./TimeCheck.Pwa.csproj -c Release -o publish/wwwroot
      - name: Copy Blazor static files to deploy folder
        run: |
          mkdir -p publish/wwwroot
          if [ -d "./bin/Release/net10.0/wwwroot" ]; then cp -r ./bin/Release/net10.0/wwwroot/* publish/wwwroot/; fi
          if [ -d "./TimeCheck.Pwa/bin/Release/net10.0/wwwroot" ]; then cp -r ./TimeCheck.Pwa/bin/Release/net10.0/wwwroot/* publish/wwwroot/; fi
      - name: 'Deploy to Azure Static Web Apps'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "publish/wwwroot"
          skip_app_build: true
